<div class="header-inner">
    <a class="logo" href="./index.html">

                </svg>
            </div>
            <div class="user-details">
                <div class="user-name" id="user-name-display">Đăng nhập</div>

        <button class="header-mobile-toggle" id="header-mobile-toggle" aria-label="Mở menu điều hướng" aria-expanded="false">
