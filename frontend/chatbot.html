<!--
  ========================================================================
  FILE: chatbot.html
  CHỨC NĂNG:
  - Giao diện AI Chatbot (TopChat) hỗ trợ giải đáp thông tin du lịch.
  ========================================================================
-->
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopChat — Trợ lý du lịch AI</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
    <meta name="description"
        content="TopChat — Trợ lý du lịch AI của TopGo. Hỏi về địa điểm, đặc sản, thời tiết, ngân sách cho bất kỳ thành phố nào tại Việt Nam. Hỗ trợ 24/7.">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/shared.css?v=2">
    <link rel="stylesheet" href="./css/chatbot.css">
</head>

<body>
    <header class="header" id="site-header">
        <div style="text-align:center;padding:16px;color:var(--sub);font-size:13px;">Đang tải header...</div>
    </header>

    <main>
        <div class="chatbot-fullscreen-with-nav" id="chatbot-wrapper">

            <!-- ── HERO SECTION ─────────────────────────────── -->
            <section class="chat-hero" id="chat-hero">
                <div class="chat-ray-bg" aria-hidden="true">
                    <div class="chat-ray-halo"></div>
                    <div class="chat-ray-ring-wrap">
                        <div class="chat-ray-ring chat-ray-ring--1"></div>
                        <div class="chat-ray-ring chat-ray-ring--2"></div>
                        <div class="chat-ray-ring chat-ray-ring--3"></div>
                        <div class="chat-ray-ring chat-ray-ring--4"></div>
                    </div>
                </div>

                <div class="chat-hero-content">
                    <div class="chat-hero-title-wrap">
                        <h1 class="chat-hero-title">
                            Bạn muốn khám phá
                            <span class="chat-hero-highlight">điều gì</span>
                            hôm nay?
                        </h1>
                        <p class="chat-hero-sub">Trợ lý AI đồng hành trên mọi hành trình.</p>
                    </div>
                </div>
            </section>

            <!-- ── CONVERSATION STICKY HEADER ──────────────── -->
            <div class="chat-conv-header" id="chat-conv-header">
                <div class="chat-conv-header-info">
                    <div class="chat-conv-header-name">TopGo</div>
                </div>
                <button class="chat-conv-back-btn" id="chat-conv-back-btn">Trang chủ</button>
            </div>

            <!-- ── CHAT CONTAINER ───────────────────────────── -->
            <div class="chatbot-container-full-width">

                <!-- Sidebar Ads — only visible in conversation mode -->
                <aside class="chat-sidebar-ad chat-sidebar-ad--left" aria-hidden="true">
                    <div class="sidebar-ad-text">
                        <div class="sidebar-ad-eyebrow">AI Planner</div>
                        <div class="sidebar-ad-title">Lên lịch<br>thông minh</div>
                        <p class="sidebar-ad-sub">Chỉ vài giây để có lịch trình hoàn hảo</p>
                    </div>
                </aside>

                <aside class="chat-sidebar-ad chat-sidebar-ad--right" aria-hidden="true">
                    <div class="sidebar-ad-text">
                        <div class="sidebar-ad-eyebrow">Khám Phá</div>
                        <div class="sidebar-ad-title">Việt Nam<br>tươi đẹp</div>
                        <p class="sidebar-ad-sub">Hơn 50 điểm đến đang chờ bạn</p>
                    </div>
                </aside>

                <!-- Messages: empty by default, only visible in conversation mode -->
                <div class="chatbot-messages-full-width" id="chatbot-messages"></div>

                <!-- Single input bar -->
                <div class="chatbot-input-area-full-width" id="chat-input-area">
                    <input type="text" id="chatbot-input" placeholder="Hỏi TopChat bất cứ điều gì về du lịch..."
                        class="chatbot-input-full-width" autocomplete="off">
                    <button id="chatbot-send" class="chatbot-send-full-width">Gửi</button>
                </div>
            </div>

        </div>
    </main>

    <div id="site-shared"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script defer src="./js/mockFallback.js"></script>
    <script type="module" src="./js/chatbot.js"></script>
</body>

</html>
