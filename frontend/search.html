<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm — TopGo</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/shared.css">
    <link rel="stylesheet" href="./css/newsfeed.css?v=22">
    <style>
        .search-page-wrapper {
            margin-bottom: 40px;
        }
        
        /* ── Dark Tech / Glow Mesh Hero ── */
        .search-hero {
            width: 100%;
            position: relative;
            padding: 50px 30px;
            margin-bottom: 40px;
            border-radius: 32px;
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.05), rgba(0, 0, 0, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 169, 255, 0.06), inset 0 2px 20px rgba(255,255,255,0.4);
            overflow: visible;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 1;
        }
        
        .search-hero-bg {
            position: absolute;
            inset: 0;
            border-radius: 32px;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        body.dark .search-hero {
            background: linear-gradient(135deg, rgba(15, 22, 40, 0.8), rgba(5, 10, 20, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 2px 20px rgba(255,255,255,0.02);
        }

        /* The Glow Mesh Backgrounds */
        .search-hero-bg::before {
            content: '';
            position: absolute;
            top: -50%; left: -20%;
            width: 70%; height: 150%;
            background: radial-gradient(ellipse at center, rgba(0, 169, 255, 0.15) 0%, transparent 60%);
            transform: rotate(-30deg);
            z-index: -1;
            filter: blur(40px);
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }
        .search-hero-bg::after {
            content: '';
            position: absolute;
            bottom: -50%; right: -20%;
            width: 60%; height: 150%;
            background: radial-gradient(ellipse at center, rgba(56, 189, 248, 0.12) 0%, transparent 60%);
            transform: rotate(20deg);
            z-index: -1;
            filter: blur(50px);
            animation: pulseGlow 10s infinite alternate-reverse ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.8; }
            100% { transform: scale(1.1) translate(20px, 30px); opacity: 1; }
        }

        .search-hero-title {
            font-family: var(--font-accent);
            font-size: 64px;
            font-weight: 700;
            color: transparent;
            background: linear-gradient(90deg, #004E98, #0078D7, #003B73);
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 24px;
            letter-spacing: -1px;
            line-height: 1.1;
            filter: drop-shadow(0 4px 16px rgba(0, 169, 255, 0.3));
        }
        body.dark .search-hero-title {
            background: linear-gradient(90deg, #fff, var(--p1), var(--p2));
            -webkit-background-clip: text;
            filter: drop-shadow(0 4px 20px rgba(0, 169, 255, 0.4));
        }

        .search-hero-desc {
            color: var(--text);
            font-size: 18px;
            max-width: 540px;
            line-height: 1.6;
            margin: 0 0 40px 0;
            font-family: var(--font-label);
            font-weight: 500;
        }
        
        /* Cải tiến Search Wrapper */
        .feed-search-wrapper.hero-search {
            width: 100%;
            max-width: 600px;
            margin: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 169, 255, 0.2);
            box-shadow: 0 16px 40px rgba(0, 169, 255, 0.1);
            border-radius: 24px;
            padding: 8px;
            transition: all 0.3s ease;
        }
        body.dark .feed-search-wrapper.hero-search {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(0, 169, 255, 0.3);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 169, 255, 0.1);
        }
        .feed-search-wrapper.hero-search:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 20px 50px rgba(0, 169, 255, 0.2);
            border-color: var(--p1);
        }

        .feed-search-wrapper.hero-search .fs-input {
            font-size: 16px;
            padding: 12px 16px 12px 48px;
        }
        .feed-search-wrapper.hero-search .fs-icon {
            left: 24px;
            width: 22px;
            height: 22px;
            color: var(--p1);
        }

        /* Trending Section */
        .trending-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 8px;
        }
        .trending-section-title {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .trending-section-title::before {
            content: '';
            width: 6px;
            height: 24px;
            background: var(--p1);
            border-radius: 3px;
        }
        
        .trending-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Pill / Glass Card Design for Trending Items */
        .trending-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 20px;
            box-shadow: 
                0 8px 32px rgba(0,169,255,0.08), 
                inset 0 1px 0 rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all var(--t);
            position: relative;
            overflow: hidden;
        }
        body.dark .trending-item {
            background: rgba(15,22,40,0.3);
            border-color: rgba(255,255,255,0.1);
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.3), 
                inset 0 1px 0 rgba(255,255,255,0.05);
        }
        
        .trending-item:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255,255,255,0.45);
            box-shadow: 
                0 12px 32px rgba(0,169,255,0.15), 
                inset 0 1px 0 rgba(255,255,255,1);
            border-color: rgba(255,255,255,0.9);
        }
        body.dark .trending-item:hover {
            background: rgba(15,22,40,0.5);
            box-shadow: 
                0 12px 32px rgba(0,0,0,0.5), 
                inset 0 1px 0 rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        /* Top 3 special glow (Subtle, luxury blue theme) */
        .trending-item.top-1 {
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.08) 0%, rgba(255, 255, 255, 0.35) 100%);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-left: 5px solid #00f0ff;
            box-shadow: 0 10px 40px rgba(0, 169, 255, 0.12), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        body.dark .trending-item.top-1 {
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.15) 0%, rgba(15, 22, 40, 0.4) 100%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-left: 5px solid #00f0ff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .trending-item.top-1:hover {
            border-color: rgba(0, 240, 255, 0.5);
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.12) 0%, rgba(255, 255, 255, 0.4) 100%);
            box-shadow: 0 15px 45px rgba(0, 240, 255, 0.2), inset 0 1px 0 rgba(255,255,255,0.9);
        }
        body.dark .trending-item.top-1:hover {
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.22) 0%, rgba(15, 22, 40, 0.5) 100%);
            border-color: rgba(0, 240, 255, 0.35);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .trending-item.top-2 {
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.04) 0%, rgba(255, 255, 255, 0.35) 100%);
            border: 1px solid rgba(0, 188, 255, 0.25);
            border-left: 5px solid rgba(0, 188, 255, 0.75);
            box-shadow: 0 8px 32px rgba(0, 169, 255, 0.08), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        body.dark .trending-item.top-2 {
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.08) 0%, rgba(15, 22, 40, 0.4) 100%);
            border: 1px solid rgba(0, 188, 255, 0.15);
            border-left: 5px solid rgba(0, 188, 255, 0.75);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .trending-item.top-2:hover {
            border-color: rgba(0, 188, 255, 0.4);
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.08) 0%, rgba(255, 255, 255, 0.4) 100%);
            box-shadow: 0 12px 36px rgba(0, 188, 255, 0.15), inset 0 1px 0 rgba(255,255,255,0.9);
        }
        body.dark .trending-item.top-2:hover {
            background: linear-gradient(135deg, rgba(0, 169, 255, 0.15) 0%, rgba(15, 22, 40, 0.5) 100%);
            border-color: rgba(0, 188, 255, 0.25);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
        }

        .trending-item.top-3 {
            border-left: 5px solid rgba(56, 189, 248, 0.45);
        }
        .trending-item.top-3:hover {
            border-color: rgba(56, 189, 248, 0.3);
            background: rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.12);
        }
        body.dark .trending-item.top-3:hover {
            border-color: rgba(56, 189, 248, 0.2);
            background: rgba(15,22,40,0.45);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .trending-rank {
            font-family: var(--font-accent);
            font-size: 32px;
            font-weight: 400;
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            line-height: 1;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), filter 0.3s ease;
        }
        .trending-item:hover .trending-rank {
            transform: scale(1.18);
        }

        .trending-item.top-1 .trending-rank, .trending-rank.rank-1 {
            background: linear-gradient(135deg, #00f0ff, #0051ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 38px;
            filter: drop-shadow(0 4px 12px rgba(0, 145, 255, 0.4));
        }
        
        .trending-item.top-2 .trending-rank, .trending-rank.rank-2 {
            background: linear-gradient(135deg, #00a9ff, #0066ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 34px;
            filter: drop-shadow(0 4px 12px rgba(0, 169, 255, 0.3));
        }
        
        .trending-item.top-3 .trending-rank, .trending-rank.rank-3 {
            background: linear-gradient(135deg, #89cff3, #0091ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 32px;
            filter: drop-shadow(0 4px 12px rgba(137, 207, 243, 0.3));
        }
        
        .trending-rank.rank-default {
            color: var(--muted);
            font-size: 24px;
            font-family: var(--font-heading);
            font-weight: 700;
        }

        .trending-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .trending-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            font-family: var(--font-heading);
        }
        .trending-meta {
            font-size: 13px;
            color: var(--muted);
            font-family: var(--font-label);
        }

        .trending-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--p1);
            background: rgba(0, 169, 255, 0.1);
            padding: 6px 10px;
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .search-hero {
                padding: 40px 20px;
            }
            .search-hero h1 {
                font-size: 36px;
            }
            .trending-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header" id="site-header"></header>

    <main>
        <div class="newsfeed-container search-layout">

            <!-- ── LEFT SIDEBAR ────────────────────────────── -->
            <div class="left-sidebar">
                <!-- TopGo Mini Widget (header space filler) -->
                <div class="sidebar-topgo-widget">
                    <div class="stw-globe">
                        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="18" cy="18" r="17" stroke="url(#g1)" stroke-width="1.5" opacity="0.6"/>
                            <ellipse cx="18" cy="18" rx="8" ry="17" stroke="url(#g1)" stroke-width="1" opacity="0.4"/>
                            <path d="M1 18h34" stroke="url(#g1)" stroke-width="1" opacity="0.4"/>
                            <path d="M3 11h30M3 25h30" stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>
                            <circle cx="18" cy="18" r="3.5" fill="url(#g1)" opacity="0.9"/>
                            <defs>
                                <linearGradient id="g1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#00a9ff"/>
                                    <stop offset="1" stop-color="#0051ff"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="stw-text">
                        <span class="stw-brand">TopGo</span>
                        <span class="stw-tagline">Du lịch · Cộng đồng</span>
                    </div>
                    <div class="stw-pulse"></div>
                </div>
                
                <!-- Separator line: Metallic luxury gem feel -->
                <div class="sidebar-separator"></div>

                <a href="feed.html" class="left-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span class="nav-text">Bảng tin</span>
                </a>
                <a href="search.html" class="left-nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <span class="nav-text">Tìm kiếm</span>
                </a>
                <!-- Nav Add (+) Button -->
                <div class="nav-add-wrapper">
                    <button class="nav-add-btn" aria-label="Tạo mới">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        <span class="nav-text">Tạo mới</span>
                    </button>
                    <div class="nav-add-popup">
                        <a href="./feed.html#post-composer-mount" class="nav-popup-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                            Đăng bài viết
                        </a>
                        <div class="nav-popup-divider"></div>
                        <a href="./planner.html" class="nav-popup-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            Tạo lịch trình
                        </a>
                        <div class="nav-popup-divider"></div>
                        <a href="./chatbot.html" class="nav-popup-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                            TopChat
                        </a>
                    </div>
                </div>
                
                <!-- Ad Widget -->
                <div class="sidebar-ad-widget">
                    <div class="sidebar-ad-inner">
                        <div class="sidebar-ad-image-container empty-state">
                            <span class="ad-empty-text">Chưa có quảng cáo</span>
                        </div>
                        <button class="sidebar-ad-btn group">
                            Khám phá
                            <div class="sidebar-ad-btn-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- ── FEED CHÍNH ─────────────────────────────────── -->
            <div class="feed-main">
                <div class="search-page-wrapper">
                    
                    <div class="search-hero anim-slide-up">
                        <div class="search-hero-bg"></div>
                        <h1 class="search-hero-title anim-slide-up delay-1">Khám phá vũ trụ TopGo</h1>
                        
                        
                        <!-- Global Search integrated into Hero -->
                        <div class="feed-search-wrapper hero-search anim-slide-up delay-3" id="feed-search-wrapper">
                            <svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" id="global-search-input" class="fs-input" placeholder="Bạn muốn tìm gì hôm nay?" autocomplete="off">
                            <div class="search-dropdown hidden" id="search-dropdown">
                                <div class="search-dropdown-content" id="search-dropdown-content"></div>
                            </div>
                        </div>
                    </div>

                    <div class="trending-section-header anim-slide-up delay-2">
                        <h2 class="trending-section-title">Đang thịnh hành</h2>
                    </div>

                    <ul class="trending-list anim-slide-up delay-3" id="main-trending-list">
                        <div style="text-align: center; padding: 20px; color: var(--muted);">Đang tải dữ liệu...</div>
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="./js/shared.js"></script>
    <script type="module">
        const API_BASE = ['localhost', '127.0.0.1', ''].includes(window.location.hostname)
            ? 'http://localhost:8000'
            : (window.__TOPGO_API_BASE__ || 'https://api.topgo.vn');



        function _escapeHtml(unsafe) {
            return (unsafe || '').toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        async function loadSearchTrending() {
            const list = document.getElementById('main-trending-list');
            try {
                const res = await fetch(`${API_BASE}/api/hot-search?limit=5`);
                let topics = [];
                if (res.ok) {
                    const data = await res.json();
                    topics = data.topics || [];
                }
                if (!topics.length) {
                    list.innerHTML = '<div style="text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px;">Chưa có chủ đề nổi bật.</div>';
                    return;
                }

                // Chỉ lấy 5 mục đầu tiên
                topics = topics.slice(0, 5);

                const html = topics.map((topic, idx) => {
                    const rank = idx + 1;
                    const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-default';
                    const topClass  = rank <= 3 ? `top-${rank}` : '';
                    const safeName = _escapeHtml(topic.name);
                    const postCount = (topic.postCount || 0).toLocaleString('vi-VN');

                    return `
                        <li class="trending-item ${topClass}" onclick="window.location.href='./location.html?name=${encodeURIComponent(topic.name || '')}'" style="cursor:pointer">
                            <div class="trending-rank ${rankClass}">${rank}</div>
                            <div class="trending-info">
                                <div class="trending-name">${safeName}</div>
                                <div class="trending-meta">Chủ đề thịnh hành</div>
                            </div>
                            <div class="trending-stat">
                                <span class="stat-count">${postCount} bài viết</span>
                            </div>
                        </li>
                    `;
                }).join('');
                
                list.innerHTML = html;
            } catch (err) {
                console.error("Lỗi tải trending search:", err);
                list.innerHTML = `<div style="text-align: center; padding: 20px; color: var(--muted);">Không thể tải dữ liệu</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadSearchTrending);
    </script>
</body>
</html>
