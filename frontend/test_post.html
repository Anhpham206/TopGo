<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Post Component</title>

    <!-- Link CSS của Component Bài Post -->
    <link rel="stylesheet" href="./css/post.css">

    <!-- BẮT BUỘC: Thư viện CSS và JS của Leaflet (OpenStreetMap) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <h2 style="text-align: center;">Khu vực Test Bài Post</h2>

    <!-- Khối chứa bài post -->
    <div id="feed-slot" style="max-width: 600px; margin: 0 auto;"></div>

    <!-- Script gọi hàm render -->
    <script type="module">
        import { renderPostCard } from './js/post.js';

        /**
         * CHẾ ĐỘ DEMO (không cần backend):
         *   Truyền mockData vào options để render bài post giả.
         *
         * CHẾ ĐỘ THẬT (cần backend đang chạy):
         *   Gọi renderPostCard('post-id-thật', slot) — không truyền mockData.
         */

        // ── Chế độ DEMO ────────────────────────────────────────────────────────
        await renderPostCard('demo-post-1', document.getElementById('feed-slot'), {
            mockData: {
                authorName:   'Lê Huỳnh Anh Thư',
                authorAvatar: 'https://ui-avatars.com/api/?name=Thu+Le&background=random',
                content:      'Demo bài post có đính kèm lịch trình! Bản đồ được hiển thị từ tọa độ thực của lịch trình (routing data).',
                type:         'itinerary',
                itineraryId:  'plan_demo_1',  // sẽ thử fetch — nếu lỗi thì card vẫn render, chỉ không có map
                likeCount:    68,
                commentCount: 12,
                createdAt:    new Date().toISOString(),
                visibility:   'public',
            }
        });

        // ── Chế độ THẬT (bỏ comment để dùng khi backend đang chạy) ────────────
        // await renderPostCard('post-1752741600000', document.getElementById('feed-slot'));
    </script>
</body>

</html>
